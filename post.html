<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>发布帖子</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>发布公共帖子</h1>
      <a href="index.html" class="btn">返回首页</a>
    </header>

    <form id="post-form" class="post-form">
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="title" required>
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="content" rows="6" required></textarea>
      </div>
      <div class="form-group">
        <label>上传图片</label>
        <input type="file" id="image-input" accept="image/*">
      </div>
      <button type="submit" class="btn submit-btn">发布</button>
    </form>
  </div>

  <script>
    const GIST_ID = "52ebb613889ce20c322b78f889d82195";
    const GIST_URL = `https://api.github.com/gists/${GIST_ID}`;
    const form = document.getElementById("post-form");
    const imageInput = document.getElementById("image-input");
    let postImage = "";

    // 图片处理
    imageInput.addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => postImage = e.target.result;
        reader.readAsDataURL(file);
      }
    });

    // 发布
    form.addEventListener("submit", async e => {
      e.preventDefault();
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();
      const time = new Date().toLocaleString();

      // 获取现有帖子
      const res = await fetch(GIST_URL);
      const data = await res.json();
      const posts = JSON.parse(data.files["posts.json"].content) || [];

      // 添加新帖子
      posts.push({ title, content, time, image: postImage });

      // 更新到公共 Gist
      await fetch(GIST_URL, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          files: {
            "posts.json": { content: JSON.stringify(posts, null, 2) }
          }
        })
      });

      alert("发布成功！全世界都能看到！");
      location.href = "index.html";
    });
  </script>
</body>
</html>
