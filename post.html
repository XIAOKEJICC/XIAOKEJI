<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>发布公共帖子</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>发布公共帖子</h1>
      <a href="index.html" class="btn">返回首页</a>
    </header>

    <form id="post-form" class="post-form">
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="title" required placeholder="请输入标题">
      </div>
      <div class="form-group">
        <label>内容</label>
        <textarea id="content" required rows="6" placeholder="请输入内容"></textarea>
      </div>
      <div class="form-group">
        <label>上传图片</label>
        <input type="file" id="image-input" accept="image/*">
      </div>
      <button type="submit" class="btn submit-btn">发布到公共论坛</button>
    </form>
  </div>

  <script>
    const API_URL = "https://jsonbox.io/demoposts123";
    const form = document.getElementById("post-form");
    const imageInput = document.getElementById("image-input");
    let postImage = "";

    // 图片上传处理
    imageInput.addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          postImage = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // 发布到公共数据
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();
      const time = new Date().toLocaleString();

      const newPost = { title, content, time, image: postImage };

      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(newPost)
      });

      alert("发布成功！全世界都能看到你的帖子！");
      location.href = "index.html";
    });
  </script>
</script>
</body>
</html>
